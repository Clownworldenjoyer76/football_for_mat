name: Final Scores MLB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  MLB_Post_Game_Final_Scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p docs/win/baseball/05_final_scores/results/final_scores
          mkdir -p docs/win/baseball/05_final_scores/results/graded/daily
          mkdir -p docs/win/baseball/05_final_scores/intermediate
          mkdir -p docs/win/baseball/05_final_scores/reports/overview
          mkdir -p docs/win/baseball/05_final_scores/reports/moneyline
          mkdir -p docs/win/baseball/05_final_scores/reports/run_line
          mkdir -p docs/win/baseball/05_final_scores/reports/totals
          mkdir -p docs/win/baseball/errors/05_final_scores

      - name: Normalize Final Score Team Names
        run: |
          python docs/win/baseball/scripts/05_final_scores/normalize_final_score_mlb_names.py || {
            echo ""
            echo "===== FINAL SCORE TEAM NORMALIZATION LOGS ====="
            find docs/win/baseball/errors/05_final_scores -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \;
            exit 1
          }

      - name: Normalize MLB Results
        run: |
          python docs/win/baseball/scripts/05_final_scores/normalize_mlb_results.py || {
            echo ""
            echo "===== MLB RESULTS NORMALIZATION LOGS ====="
            find docs/win/baseball/errors/05_final_scores -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \;
            exit 1
          }

      - name: Grade MLB Bets
        run: |
          python docs/win/baseball/scripts/05_final_scores/01_mlb_results_grade.py || {
            echo ""
            echo "===== MLB GRADING LOGS ====="
            find docs/win/baseball/errors/05_final_scores -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \;
            exit 1
          }

      - name: Analyze MLB Results
        run: |
          python docs/win/baseball/scripts/05_final_scores/02_mlb_results_analyze.py || {
            echo ""
            echo "===== MLB ANALYSIS LOGS ====="
            find docs/win/baseball/errors/05_final_scores -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \;
            exit 1
          }

      - name: Generate MLB Reports
        run: |
          python docs/win/baseball/scripts/05_final_scores/03_mlb_results_reports.py || {
            echo ""
            echo "===== MLB REPORT LOGS ====="
            find docs/win/baseball/errors/05_final_scores -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \;
            exit 1
          }

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f docs/win/baseball/05_final_scores/
          git add -f docs/win/baseball/errors/05_final_scores/

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore: MLB post-game final scores $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
