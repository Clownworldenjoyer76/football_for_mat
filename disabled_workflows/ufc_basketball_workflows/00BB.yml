name: 00_intake_basketball
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  intake:
    runs-on: ubuntu-latest
    env:
      CLOUDBET_API_KEY: ${{ secrets.CLOUDBET_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pandas playwright pytz requests
          playwright install chromium
      - name: Create output directories
        run: |
          mkdir -p docs/win/basketball/errors/00_intake
          mkdir -p docs/win/basketball/odds/ncaam
          mkdir -p docs/win/basketball/odds/wnba
          mkdir -p docs/win/basketball/00_intake/predictions/nba
          mkdir -p docs/win/basketball/00_intake/predictions/ncaam
          mkdir -p docs/win/basketball/00_intake/predictions/wnba
          mkdir -p docs/win/basketball/00_intake/sportsbook/nba
          mkdir -p docs/win/basketball/00_intake/sportsbook/ncaam
          mkdir -p docs/win/basketball/00_intake/sportsbook/wnba
          mkdir -p docs/win/basketball/00_intake/drat_raw/nba
          mkdir -p docs/win/basketball/00_intake/drat_raw/ncaam
          mkdir -p docs/win/basketball/00_intake/drat_raw/wnba
          mkdir -p docs/win/basketball/05_final_scores/results/nba
          mkdir -p docs/win/basketball/05_final_scores/results/ncaam
          mkdir -p docs/win/basketball/05_final_scores/results/wnba
          mkdir -p docs/win/basketball/daily_games/nba
          mkdir -p docs/win/basketball/daily_games/ncaam
          mkdir -p docs/win/basketball/daily_games/wnba
          mkdir -p mappings/basketball/no_map
      - name: Run 00_intake_basketball
        run: python docs/win/basketball/scripts/master_scripts/00_intake_basketball.py
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intake-logs
          path: docs/win/basketball/errors/00_intake/
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/win/basketball/ mappings/basketball/no_map/
          git diff --cached --quiet || git commit -m "basketball intake run $(date +'%Y-%m-%d')"
          git push
