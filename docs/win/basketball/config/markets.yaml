# docs/win/basketball/config/markets.yaml
#
# Per-league × per-market × per-side filter configuration.
# Defaults are intentionally wide-open so all qualifying bets pass through.
# Tighten bands as the bucketed analysis tells you which slices profit.
#
# Filter structure (each side):
#   odds_bands           : list of [american_min, american_max] inclusive
#   line_bands           : list of [line_min, line_max]  (spread/total only)
#   ev_bands             : list of [ev_min, ev_max]      (decimal, e.g. 0.02 = 2%)
#   kelly_bands          : list of [kelly_min, kelly_max] (decimal fraction)
#   model_prob_bands     : list of [prob_min, prob_max]   (decimal probability)
#   edge_vs_market_bands : list of [pp_min, pp_max]       (percentage points)
#
# Date filters per side (empty/missing = no restriction):
#   months                 : list of ints 1-12 to BET IN
#   exclude_days_of_week   : list of ints 0-6 (Mon=0, Sun=6) to SKIP
#
# Per-market:
#   pick_preference.metric    : one of [ev, kelly, model_prob, edge_vs_market]
#   pick_preference.direction : one of [max, min]
#   selection_mode            : one of [pick_one, all_qualifying]
#                               pick_one  -> one side per game using preference
#                               all_qualifying -> emit every passing side
#
# Top-level:
#   stake_sizing.kelly_fraction : multiplier on raw Kelly (e.g., 0.25 for ¼ Kelly)
#   stake_sizing.kelly_cap      : maximum stake as fraction of bankroll
#
#   ml_vs_spread_tiebreak       : when both ML and spread qualify on the same
#                                 game, keep only one. Tiebreak by:
#                                   ev             -> higher EV wins
#                                   kelly          -> higher Kelly wins
#                                   edge_vs_market -> higher edge_vs_market (pp) wins
#                                 The losing market is dropped entirely for that game.
#                                 Total bets are not affected by this rule.

# docs/win/basketball/config/markets.yaml
#
# NBA filters tuned from NBA_final.csv backtest (1,544 bets):
#   Combined filter: 528 bets, 61.04% win rate, +17.63% ROI, +$93.08 P&L.
#
# NCAAM and WNBA remain wide-open until tuned with their own backtests.

stake_sizing:
  kelly_fraction: 0.25
  kelly_cap: 0.05

ml_vs_spread_tiebreak: ev

markets:

###################################################################################################
# NBA — TUNED #####################################################################################
###################################################################################################
#
# Per-slice backtest results:
#   ML home    (EV 1.84-3.99%)                          n=49   wr=59.2%   roi=+21.1%
#   ML away    (Kelly <2.5% AND model_prob >=30%)       n=32   wr=62.5%   roi=+28.7%
#   Spread home (line magnitude 6-9)                    n=13   wr=61.5%   roi=+17.2%   [small sample]
#   Spread away (EV >=3% AND Kelly >=2.5% AND |line|<=9) n=142 wr=64.3%  roi=+22.4%
#   Total under (Kelly <20% AND mp <60% AND line outside 225-230) n=292 wr=59.6% roi=+13.5%
#   Total over: disabled (no profitable slice in backtest)

  nba:

    moneyline:
      enabled: true
      selection_mode: pick_one
      pick_preference:
        metric: ev
        direction: max

      home:
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0184, 0.0399]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.025]]
        model_prob_bands:     [[0.30, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    spread:
      enabled: true
      selection_mode: pick_one
      pick_preference:
        metric: ev
        direction: max

      home:
        # SP home only profitable when |line| in 6-9.
        # home_spread is negative when home favored, so 6-9 abs maps to
        # the [-9, -6] band on home_spread (or [6, 9] when home is dog).
        enabled: true
        line_bands:           [[-9.0, -6.0], [6.0, 9.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        # SP away: EV >= 3% AND Kelly >= 2.5% AND |line| <= 9.
        enabled: true
        line_bands:           [[-9.0, 9.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.03, 1.0]]
        kelly_bands:          [[0.025, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    total:
      enabled: true
      selection_mode: pick_one
      pick_preference:
        metric: ev
        direction: max

      over:
        enabled: false
        line_bands:           [[150.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      under:
        # Kelly <20%, model_prob <60%, line OUTSIDE 225-230 (dead zone).
        # Implemented via two line_bands segments.
        enabled: true
        line_bands:           [[150.0, 224.99], [230.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.20]]
        model_prob_bands:     [[0.0, 0.60]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

