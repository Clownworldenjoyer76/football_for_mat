markets:
  nhl:

    ###################################################
    # ── Moneyline ────────────────────────────────────
    ###################################################

    moneyline:
      enabled: true

      # best_ev = one moneyline side max per game, highest EV
      # best_prob = one moneyline side max per game, highest model probability
      # all = can select both sides if both pass
      pick_preference: all

      home:
        enabled: true

        # based on home_model_prob_moneyline from the moneyline EV file
        prob_bands:
          - [0.55, 0.9999]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 999.9999]

        kelly_bands:
          - [0.0001, 999.9999]

      away:
        enabled: true

        # based on away_model_prob_moneyline from the moneyline EV file
        prob_bands:
          - [0.55, 0.9999]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 999.9999]

        kelly_bands:
          - [0.0001, 999.9999]


    ###################################################
    # ── Puck Line ─────────────────────────────────────
    ###################################################

    puck_line:
      enabled: true

      # best_ev = one puck-line side max per game, highest EV
      # best_prob = one puck-line side max per game, highest model probability
      # all = can select both sides if both pass
      pick_preference: all

      home:
        enabled: true

        # based on home_model_prob_puck_line from the puck-line EV file
        prob_bands:
          - [0.0001, 0.9999]

        line_bands:
          - [-100.0, 100.0]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 999.9999]

        kelly_bands:
          - [0.0001, 999.9999]

      away:
        enabled: true

        # based on away_model_prob_puck_line from the puck-line EV file
        prob_bands:
          - [0.70, 0.9999]

        line_bands:
          - [-100.0, 100.0]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 999.9999]

        kelly_bands:
          - [0.0001, 999.9999]


    ###################################################
    # ── Totals ───────────────────────────────────────
    ###################################################

    total:
      enabled: true

      # best_ev = one total side max per game, highest EV
      # best_prob = one total side max per game, highest model probability
      # all = can select both sides if both pass
      pick_preference: all

      over:
        enabled: true

        # based on over_model_prob_total from the total EV file
        prob_bands:
          - [0.0001, 0.9999]

        line_bands:
          - [0.0, 100.0]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 0.10]

        kelly_bands:
          - [0.0001, 999.9999]

      under:
        enabled: true

        # based on under_model_prob_total from the total EV file
        prob_bands:
          - [0.0001, 0.9999]

        line_bands:
          - [0.0, 100.0]

        odds_bands:
          - [-10000, 10000]

        ev_bands:
          - [0.0001, 00.10]

        kelly_bands:
          - [0.0001, 999.9999]
