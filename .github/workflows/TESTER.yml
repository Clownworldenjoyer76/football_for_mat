name: Grade MLB Bets Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  grade-mlb-bets-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy

      - name: Run MLB grading and print useful logs
        run: |
          set +e

          echo "=== INPUT COUNTS ==="
          echo "Select files:"
          find docs/win/baseball/04_select -maxdepth 1 -type f -name "*MLB*.csv" | wc -l

          echo "Final score files:"
          find docs/win/baseball/05_final_scores/results/final_scores -maxdepth 1 -type f -name "*_final_scores_MLB.csv" | wc -l

          echo ""
          echo "=== RUN GRADER ==="
          python docs/win/baseball/scripts/05_final_scores/01_mlb_results_grade.py
          GRADE_EXIT=$?

          echo ""
          echo "=== GRADER EXIT CODE ==="
          echo "$GRADE_EXIT"

          echo ""
          echo "=== ERROR LOG ==="
          if [ -f docs/win/baseball/errors/05_final_scores/mlb_results_grade_errors.txt ]; then
            cat docs/win/baseball/errors/05_final_scores/mlb_results_grade_errors.txt
          else
            echo "No error log found."
          fi

          echo ""
          echo "=== SUMMARY LOG ==="
          if [ -f docs/win/baseball/errors/05_final_scores/mlb_results_grade_summary.txt ]; then
            cat docs/win/baseball/errors/05_final_scores/mlb_results_grade_summary.txt
          else
            echo "No summary log found."
          fi

          echo ""
          echo "=== UNMATCHED FILES ==="
          if [ -d docs/win/baseball/05_final_scores/results/unmatched ]; then
            find docs/win/baseball/05_final_scores/results/unmatched -type f -name "*.csv" | sort
          else
            echo "No unmatched directory found."
          fi

          echo ""
          echo "=== GRADED MASTER FILE ==="
          if [ -f docs/win/baseball/05_final_scores/results/graded/MLB_final.csv ]; then
            python -c "import pandas as pd; p='docs/win/baseball/05_final_scores/results/graded/MLB_final.csv'; df=pd.read_csv(p,dtype=str); print('rows=' + str(len(df))); print('columns=' + ','.join(df.columns)); print(df.head(20).to_string(index=False))"
          else
            echo "No graded master file found."
          fi

          exit "$GRADE_EXIT"
