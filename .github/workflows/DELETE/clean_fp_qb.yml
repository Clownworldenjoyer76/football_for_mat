name: Clean FantasyPros QB

on:
  workflow_dispatch:
    inputs:
      season:
        description: "NFL season"
        required: true
        type: string

jobs:
  clean-fp-qb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clean FantasyPros QB file
        run: |
          python docs/win/football/nfl/scripts/00_intake/clean_qb_fp.py --season "${{ inputs.season }}"

      - name: Commit cleaned FantasyPros QB file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Clean FantasyPros QB data for ${{ inputs.season }}"
          file_pattern: docs/win/football/nfl/data/qb_data/clean_qb/*.csv
