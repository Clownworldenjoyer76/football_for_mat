name: Merge NHL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nhl-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(TZ='America/New_York' date +%Y_%m_%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p docs/win/hockey/nhl/01_merge/
          mkdir -p docs/win/hockey/nhl/01_merge/audit/
          mkdir -p docs/win/hockey/nhl/01_merge/01_merguiced/
          mkdir -p docs/win/hockey/nhl/errors/01_merge/

      - name: NHL Merge Intake
        id: merge_intake
        continue-on-error: true
        run: |
          set +e
          python docs/win/hockey/nhl/scripts/01_merge/merge_intake.py
          STATUS=$?
          echo "MERGE_STATUS=$STATUS" >> $GITHUB_ENV
          exit 0

      - name: NHL Build Juice Files
        if: env.MERGE_STATUS == '0'
        id: build_juice_files
        continue-on-error: true
        run: |
          set +e
          python docs/win/hockey/nhl/scripts/01_merge/build_juice_files.py
          STATUS=$?
          echo "BUILD_STATUS=$STATUS" >> $GITHUB_ENV
          exit 0

      - name: Set default build status
        if: env.MERGE_STATUS != '0'
        run: echo "BUILD_STATUS=0" >> $GITHUB_ENV

      - name: Print NHL merge logs
        if: always()
        run: |
          echo "=== NHL merge logs ==="
          find docs/win/hockey/nhl/errors/01_merge -type f -name "*.txt" -print -exec cat {} \; || true

          echo "=== NHL merge audit files ==="
          find docs/win/hockey/nhl/01_merge/audit -type f -name "*.csv" -print -exec head -50 {} \; || true

          echo "=== NHL merge output files ==="
          find docs/win/hockey/nhl/01_merge -maxdepth 1 -type f -name "*.csv" -print -exec head -20 {} \; || true

          echo "=== NHL pre-juice output files ==="
          find docs/win/hockey/nhl/01_merge/01_merguiced -type f -name "*.csv" -print -exec head -20 {} \; || true

      - name: Commit outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/hockey/nhl/01_merge/
          git add docs/win/hockey/nhl/01_merge/audit/
          git add docs/win/hockey/nhl/01_merge/01_merguiced/
          git add docs/win/hockey/nhl/errors/01_merge/

          git diff --cached --quiet || git commit -m "chore: nhl merge run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Fail workflow if merge or build failed
        if: always()
        run: |
          echo "MERGE_STATUS=${MERGE_STATUS}"
          echo "BUILD_STATUS=${BUILD_STATUS}"

          if [ "${MERGE_STATUS}" != "0" ]; then
            echo "NHL Merge Intake failed. Outputs were committed for inspection."
            exit "${MERGE_STATUS}"
          fi

          if [ "${BUILD_STATUS}" != "0" ]; then
            echo "NHL Build Juice Files failed. Outputs were committed for inspection."
            exit "${BUILD_STATUS}"
          fi

          echo "NHL merge workflow completed successfully."
