name: NFL League Master Pull

on:
  workflow_dispatch:

jobs:
  pull-league-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run league_master.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/league_master.py

      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/data/master/league_master.csv
          git add docs/win/football/nfl/data/master/league_standings.csv
          git diff --staged --quiet || git commit -m "Update league_master.csv and league_standings.csv"
          git push
