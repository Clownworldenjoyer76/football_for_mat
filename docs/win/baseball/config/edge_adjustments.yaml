# docs/win/baseball/config/edge_adjustments.yaml
#
# Parameters for contextual edge adjustments in compute_edges.py.
# All scale factors are nudges applied on top of the base edge.
#
# Current weather schema supported by compute_edges.py:
#   weather_applicable
#   temp_f
#   wind_mph
#   wind_blowing_out
#   precip_in
#   humidity
#   air_pressure_at_sea_level
#   dew_point_f
#
# Dropped / not used here:
#   chance_of_rain
#   gust_mph
#
# Tune these after tracking results.

mlb:

  # ── Park Factor ─────────────────────────────────────────────
  # Applied to all three markets.
  #
  # Totals:
  #   over edge  *= 1 + (park_R - 100) * park_edge_scale
  #   under edge *= 1 - (park_R - 100) * park_edge_scale
  #
  # Moneyline / Run Line:
  #   park_nudge = (park_factor - 100) * park_edge_scale * sign(lineup_xwoba_diff)
  #   home edge += park_nudge
  #   away edge -= park_nudge
  #
  # Normal starting value:
  # park_edge_scale: 0.002
  park_edge_scale: 0.99


  # ── SP xwOBA Adjustment ─────────────────────────────────────
  # Applied to moneyline and run line.
  #
  # sp_xwoba_diff = home_sp_xwoba - away_sp_xwoba
  # Positive = home pitcher weaker.
  #
  # Effect:
  #   home edge down
  #   away edge up
  #
  # nudge = sp_xwoba_diff * sp_xwoba_scale
  #
  # Normal starting value:
  # sp_xwoba_scale: 0.5
  sp_xwoba_scale: 0.99


  # ── Lineup xwOBA Adjustment ─────────────────────────────────
  # Applied to moneyline and run line.
  #
  # lineup_xwoba_diff = home_lineup_xwoba - away_lineup_xwoba
  # Positive = home lineup stronger.
  #
  # Effect:
  #   home edge up
  #   away edge down
  #
  # nudge = lineup_xwoba_diff * lineup_xwoba_scale
  #
  # Normal starting value:
  # lineup_xwoba_scale: 0.3
  lineup_xwoba_scale: 0.99


  # ── Weather: Wind ───────────────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   wind_mph
  #   wind_blowing_out
  #
  # wind_blowing_out = 1:
  #   over edge up
  #   under edge down
  #
  # wind_blowing_out = 0:
  #   over edge down
  #   under edge up
  #
  # wind_nudge = (wind_mph / 20) * wind_nudge_scale
  #
  # Normal starting values:
  # wind_nudge_threshold: 12
  # wind_nudge_scale: 0.005
  wind_nudge_threshold: 5
  wind_nudge_scale: 0.99


  # ── Weather: Temperature ────────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   temp_f
  #
  # Cold:
  #   temp_f below temp_cold_threshold
  #   over edge down
  #
  # Hot:
  #   temp_f above temp_hot_threshold
  #   over edge up
  #
  # cold_nudge = (temp_cold_threshold - temp_f) / temp_cold_threshold * temp_nudge_scale
  # hot_nudge  = (temp_f - temp_hot_threshold) / temp_hot_threshold * temp_nudge_scale
  #
  # Normal starting values:
  # temp_cold_threshold: 50
  # temp_hot_threshold: 80
  # temp_nudge_scale: 0.003
  temp_cold_threshold: 50
  temp_hot_threshold: 80
  temp_nudge_scale: 0.99


  # ── Weather: Air Pressure ───────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   air_pressure_at_sea_level
  #
  # Lower pressure can mean thinner air / better carry:
  #   pressure below pressure_low_threshold
  #   over edge up
  #   under edge down
  #
  # Higher pressure can suppress carry:
  #   pressure above pressure_high_threshold
  #   over edge down
  #   under edge up
  #
  # low_nudge  = (pressure_low_threshold - pressure) / pressure_low_threshold * pressure_nudge_scale
  # high_nudge = (pressure - pressure_high_threshold) / pressure_high_threshold * pressure_nudge_scale
  #
  # Normal starting values:
  # pressure_low_threshold: 1010
  # pressure_high_threshold: 1020
  # pressure_nudge_scale: 0.003
  pressure_low_threshold: 1010
  pressure_high_threshold: 1020
  pressure_nudge_scale: 0.003


  # ── Weather: Dew Point ──────────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   dew_point_f
  #
  # High dew point can indicate heavy/moist air and better carry conditions:
  #   dew_point_f above dew_point_high_threshold
  #   over edge up
  #
  # Low dew point can indicate dry/cooler carry conditions:
  #   dew_point_f below dew_point_low_threshold
  #   over edge down
  #
  # low_nudge  = (dew_point_low_threshold - dew_point_f) / dew_point_low_threshold * dew_point_nudge_scale
  # high_nudge = (dew_point_f - dew_point_high_threshold) / dew_point_high_threshold * dew_point_nudge_scale
  #
  # Normal starting values:
  # dew_point_low_threshold: 45
  # dew_point_high_threshold: 65
  # dew_point_nudge_scale: 0.003
  dew_point_low_threshold: 45
  dew_point_high_threshold: 65
  dew_point_nudge_scale: 0.003


  # ── Weather: Precipitation ──────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   precip_in
  #
  # Measurable precipitation suppresses scoring conditions:
  #   over edge down
  #   under edge up
  #
  # precip_nudge = (precip_in / precip_nudge_threshold) * precip_nudge_scale
  #
  # Normal starting values:
  # precip_nudge_threshold: 0.02
  # precip_nudge_scale: 0.004
  precip_nudge_threshold: 0.02
  precip_nudge_scale: 0.004


  # ── Weather: Humidity ───────────────────────────────────────
  # Applied to totals only.
  # Only applied when weather_applicable = 1.
  #
  # Uses:
  #   humidity
  #
  # This is intentionally weaker than dew point because humidity alone is noisier.
  #
  # High humidity:
  #   over edge up slightly
  #
  # Low humidity:
  #   over edge down slightly
  #
  # low_nudge  = (humidity_low_threshold - humidity) / humidity_low_threshold * humidity_nudge_scale
  # high_nudge = (humidity - humidity_high_threshold) / humidity_high_threshold * humidity_nudge_scale
  #
  # Normal starting values:
  # humidity_low_threshold: 35
  # humidity_high_threshold: 70
  # humidity_nudge_scale: 0.0015
  humidity_low_threshold: 35
  humidity_high_threshold: 70
  humidity_nudge_scale: 0.0015
