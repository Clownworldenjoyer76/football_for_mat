name: QB Stats

on:
  workflow_dispatch:

jobs:
  pull-qb-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run pull_qb_stats.py
        run: python docs/win/football/nfl/scripts/00_intake/pull_qb_stats.py

      - name: Commit output file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/win/football/nfl/00_intake/qb/*.csv
          git diff --staged --quiet || git commit -m "Update QB stats"
          git push
