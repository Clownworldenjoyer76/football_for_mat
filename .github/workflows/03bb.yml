name: Basketball 03 Edges - Compute EV Kelly

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute-ev-kelly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Ensure output and error folders exist
        run: |
          mkdir -p docs/win/basketball/03_edges/ev_kelly/nba/moneyline
          mkdir -p docs/win/basketball/03_edges/ev_kelly/nba/spread
          mkdir -p docs/win/basketball/03_edges/ev_kelly/nba/total
          mkdir -p docs/win/basketball/03_edges/ev_kelly/ncaam/moneyline
          mkdir -p docs/win/basketball/03_edges/ev_kelly/ncaam/spread
          mkdir -p docs/win/basketball/03_edges/ev_kelly/ncaam/total
          mkdir -p docs/win/basketball/03_edges/ev_kelly/wnba/moneyline
          mkdir -p docs/win/basketball/03_edges/ev_kelly/wnba/spread
          mkdir -p docs/win/basketball/03_edges/ev_kelly/wnba/total
          mkdir -p docs/win/basketball/errors/03_edges

      - name: Run compute EV Kelly
        run: |
          python docs/win/basketball/scripts/03_edges/compute_ev_kelly.py

      - name: Show output summary
        if: always()
        run: |
          echo "=== EV Kelly outputs ==="
          find docs/win/basketball/03_edges/ev_kelly -type f | sort || true
          echo ""
          echo "=== Log ==="
          cat docs/win/basketball/errors/03_edges/compute_ev_kelly.txt || true

      - name: Commit outputs
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/basketball/03_edges/ev_kelly
          git add docs/win/basketball/errors/03_edges/compute_ev_kelly.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run basketball compute EV Kelly"
            git push
          fi
