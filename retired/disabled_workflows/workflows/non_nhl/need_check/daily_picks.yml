name: Generate Daily Picks

on:
  workflow_dispatch:

jobs:
  run-daily-picks:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run daily picks script
        run: python scripts/daily_picks.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/final_scores/daily_picks/*.csv || true
          git add docs/win/final_scores/errors/*.txt || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate daily picks"
            git push
          fi
