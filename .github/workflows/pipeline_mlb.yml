name: Pipeline MLB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  MLB_Pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create output directories
        run: |
          # Baseball
          mkdir -p docs/win/baseball/01_merge/
          mkdir -p docs/win/baseball/01_merge/01_merguiced/
          mkdir -p docs/win/baseball/errors/01_merge/
          mkdir -p docs/win/baseball/errors/02_juice/
          mkdir -p docs/win/baseball/02_juice/
          mkdir -p docs/win/baseball/errors/03_edges/
          mkdir -p docs/win/baseball/03_edges/
          mkdir -p docs/win/baseball/03_edges/ev_kelly/
          mkdir -p docs/win/baseball/04_select/
          mkdir -p docs/win/baseball/errors/04_select/
          mkdir -p docs/win/baseball/05_final_scores/results/final_scores
          mkdir -p docs/win/baseball/05_final_scores/results/graded/daily
          mkdir -p docs/win/baseball/05_final_scores/intermediate
          mkdir -p docs/win/baseball/05_final_scores/reports/overview
          mkdir -p docs/win/baseball/05_final_scores/reports/moneyline
          mkdir -p docs/win/baseball/05_final_scores/reports/run_line
          mkdir -p docs/win/baseball/05_final_scores/reports/totals
          mkdir -p docs/win/baseball/errors/05_final_scores

      # -------------------------
      # BASEBALL PIPELINE 01-05
      # -------------------------

      - name: Baseball Merge Intake
        run: python docs/win/baseball/scripts/01_merge/merge_intake.py

      - name: Baseball Build Juice Files
        run: python docs/win/baseball/scripts/01_merge/build_juice_files.py

      - name: Baseball Moneyline Juice
        run: python docs/win/baseball/scripts/02_juice/apply_moneyline_juice.py

      - name: Baseball Run Line Juice
        run: python docs/win/baseball/scripts/02_juice/apply_run_line_juice.py

      - name: Baseball Total Juice
        run: python docs/win/baseball/scripts/02_juice/apply_total_juice.py

      - name: Baseball Edges
        run: python docs/win/baseball/scripts/03_edges/compute_edges.py

      - name: Baseball EV Kelly
        run: python docs/win/baseball/scripts/03_edges/compute_ev_kelly.py

      - name: Baseball Select
        run: python docs/win/baseball/scripts/04_select/baseball_select_bets.py

      - name: Stage 5 - Normalize Final Score Team Names
        run: python docs/win/baseball/scripts/05_final_scores/normalize_final_score_mlb_names.py

      - name: Stage 5 - Normalize MLB Results
        run: python docs/win/baseball/scripts/05_final_scores/normalize_mlb_results.py

      - name: Stage 5 - Grade MLB Bets
        run: python docs/win/baseball/scripts/05_final_scores/01_mlb_results_grade.py

      - name: Stage 5 - Analyze MLB Results
        run: python docs/win/baseball/scripts/05_final_scores/02_mlb_results_analyze.py

      - name: Stage 5 - Generate MLB Reports
        run: python docs/win/baseball/scripts/05_final_scores/03_mlb_results_reports.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/win/baseball/01_merge/
          git add docs/win/baseball/errors/01_merge/
          git add docs/win/baseball/errors/02_juice/
          git add docs/win/baseball/02_juice/
          git add docs/win/baseball/errors/03_edges/
          git add docs/win/baseball/03_edges/
          git add docs/win/baseball/04_select/
          git add docs/win/baseball/errors/04_select/
          git add -f docs/win/baseball/05_final_scores/
          git add -f docs/win/baseball/errors/05_final_scores/

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore: MLB Pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
