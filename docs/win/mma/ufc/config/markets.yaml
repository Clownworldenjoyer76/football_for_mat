ufc:
  moneyline:
    enabled: true

    # Which metric to use when selecting the single best pick per fight
    # Options: best_ev, best_edge, best_kelly, best_model_prob, best_dratings_prob
    pick_preference: best_ev

    # Only include fighters whose moneyline falls within at least one band
    # Format: [min_moneyline, max_moneyline] in American odds
    odds_bands:
      - [-360, -150]
      - [-120, 150]

    # Only include fighters where (model_prob - implied_prob) falls within at least one band
    edge_bands:
      - [0.01, 0.25]

    # Only include fighters where expected value falls within at least one band
    # EV = (model_prob * odds_payout) - (1 - model_prob)
    ev_bands:
      - [0.01, 0.25]

    # Only include fighters where fractional Kelly stake falls within at least one band
    # Kelly = ((model_prob * (odds + 1)) - 1) / odds * 0.25
    kelly_bands:
      - [0.01, 0.25]

    # Minimum model probability to include a fighter
    model_probability_minimum: 0.40

    # Minimum dratings probability to include a fighter
    dratings_probability_minimum: 0.35
