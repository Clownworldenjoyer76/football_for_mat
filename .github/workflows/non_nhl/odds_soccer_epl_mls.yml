name: Odds Soccer EPL + MLS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  soccer-odds-epl-mls:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}
      TZ: America/New_York

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create soccer output folders
        run: |
          mkdir -p docs/win/soccer/00_intake/sportsbook/epl
          mkdir -p docs/win/soccer/00_intake/sportsbook/mls
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/epl
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/mls
          mkdir -p docs/win/soccer/errors/00_intake

      - name: Run EPL odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_epl.py

      - name: Run MLS odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_mls.py

      - name: Show output files
        run: |
          echo "=== Sportsbook CSV outputs ==="
          find docs/win/soccer/00_intake/sportsbook/epl -type f -name "*.csv" -maxdepth 1 -print
          find docs/win/soccer/00_intake/sportsbook/mls -type f -name "*.csv" -maxdepth 1 -print

          echo "=== Raw JSON outputs ==="
          find docs/win/soccer/00_intake/odds_api_raw/epl -type f -name "*.json" -maxdepth 1 -print
          find docs/win/soccer/00_intake/odds_api_raw/mls -type f -name "*.json" -maxdepth 1 -print

          echo "=== Logs ==="
          find docs/win/soccer/errors/00_intake -type f -name "odds_*.txt" -maxdepth 1 -print

      - name: Commit soccer odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/soccer/00_intake/sportsbook/epl/
          git add docs/win/soccer/00_intake/sportsbook/mls/
          git add docs/win/soccer/00_intake/odds_api_raw/epl/
          git add docs/win/soccer/00_intake/odds_api_raw/mls/
          git add docs/win/soccer/errors/00_intake/odds_epl.txt
          git add docs/win/soccer/errors/00_intake/odds_mls.txt

          git diff --cached --quiet && echo "No soccer odds output changes to commit." || git commit -m "Update soccer EPL and MLS odds outputs"
          git push
