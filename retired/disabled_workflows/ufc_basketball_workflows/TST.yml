name:  Dratings Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-basketball-dratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytz
          python -m playwright install chromium

      - name: Ensure output folders exist
        run: |
          mkdir -p docs/win/basketball/00_intake/drat_raw/nba
          mkdir -p docs/win/basketball/00_intake/drat_raw/ncaam
          mkdir -p docs/win/basketball/00_intake/drat_raw/wnba
          mkdir -p docs/win/basketball/errors/00_intake

      - name: Run basketball Dratings scraper
        run: |
          python docs/win/basketball/scripts/00_intake/basketball_drat_scraper.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/basketball/00_intake/drat_raw/
          git add docs/win/basketball/errors/00_intake/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update basketball Dratings raw data"
            git push
          fi
