name: Intake Soccer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  soccer-intake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(TZ='America/New_York' date +%Y_%m_%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Create output directories
        run: |
          mkdir -p docs/win/soccer/errors/00_intake/
          mkdir -p mappings/soccer/no_map/
          mkdir -p docs/win/soccer/00_intake/predictions/
          mkdir -p docs/win/soccer/00_intake/predictions/normalized/
          mkdir -p docs/win/soccer/00_intake/sportsbook/
          mkdir -p docs/win/soccer/00_intake/sportsbook/normalized/
          mkdir -p docs/win/final_scores/results/soccer/final_scores/
          mkdir -p docs/win/soccer/05_final_scores/results/final_scores/

      - name: Soccer Name Normalization
        run: python docs/win/soccer/scripts/00_intake/name_normalization.py

      - name: Soccer Cleaner
        run: python docs/win/soccer/scripts/00_intake/soccer_cleaner.py

      - name: Run soccer add game_id script
        run: python docs/win/soccer/scripts/00_intake/soccer_add_game_id.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/soccer/errors/00_intake/
          git add docs/win/soccer/00_intake/predictions/
          git add docs/win/final_scores/results/soccer/final_scores/
          git add docs/win/soccer/05_final_scores/results/final_scores/
          git add mappings/soccer/no_map/
          git add docs/win/soccer/00_intake/sportsbook/
          git add docs/win/soccer/00_intake/predictions/normalized/
          git add docs/win/soccer/00_intake/sportsbook/normalized/
          git add docs/win/soccer/05_final_scores/results/final_scores/
          git add docs/win/soccer/05_final_scores/errors/

          git diff --cached --quiet || git commit -m "chore: soccer intake run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
