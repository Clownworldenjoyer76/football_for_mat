# docs/win/basketball/config/markets.yaml
#
# All three leagues tuned from per-league backtests.
#
# Combined backtest results (each filter pass):
#   NBA   : 1,544 -> 528 bets,   wr=61.0%, ROI=+17.6%, P&L=+$93
#   NCAAM : 5,321 -> 982 bets,   wr=59.2%, ROI=+17.4%, P&L=+$171
#   WNBA  :   421 -> 250 bets,   wr=59.3%, ROI=+32.1%, P&L=+$80
#
# Per-slice details inline below each league.

stake_sizing:
  kelly_fraction: 0.25
  kelly_cap: 0.05

ml_vs_spread_tiebreak: ev

markets:

###################################################################################################
# NBA — TUNED #####################################################################################
###################################################################################################
#   ML home    (EV 1.84-3.99%)                            n=49   wr=59.2%   roi=+21.1%
#   ML away    (Kelly <2.5% AND model_prob >=30%)         n=32   wr=62.5%   roi=+28.7%
#   Spread home (|line| 6-9)                              n=13   wr=61.5%   roi=+17.2%   [small]
#   Spread away (EV >=3% AND Kelly >=2.5% AND |line|<=9)  n=142  wr=64.3%   roi=+22.4%
#   Total under (Kelly <20% AND mp <60% AND line outside 225-230)  n=292 wr=59.6% roi=+13.5%
#   Total over: disabled

  nba:

    moneyline:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        enabled: true
        odds_bands:           [[-10000, -150], [126, 500]]
        ev_bands:             [[0.02, 0.0399]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.3, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.02, 1.0]]
        kelly_bands:          [[0.0, 0.025]]
        model_prob_bands:     [[0.30, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    spread:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        enabled: true
        line_bands:           [[-9.0, -6.0], [6.0, 9.0]]
        odds_bands:           [[-10000, -110]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        enabled: true
        line_bands:           [[-9.0, 9.0]]
        odds_bands:           [[-10000, -110]]
        ev_bands:             [[0.05, 1.0]]
        kelly_bands:          [[0.025, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    total:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      over:
        enabled: true
        line_bands:           [[150.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      under:
        enabled: true
        line_bands:           [[150.0, 224.99], [230.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.20]]
        model_prob_bands:     [[0.0, 0.60]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

###################################################################################################
# NCAAM — TUNED ###################################################################################
###################################################################################################
#   ML home    (model_prob 50-60%)                              n=82   wr=57.3%   roi=+11.1%
#   ML away    (EV 3-10% AND Kelly <5%)                         n=60   wr=51.7%   roi=+56.4%
#   Spread home (|line| >=3 AND (Kelly <2.5% OR Kelly >=20%))   n=44   wr=74.4%   roi=+42.2%
#   Spread away (|line| >=6 AND odds in -110 to +100)           n=589  wr=60.1%   roi=+15.6%
#   Total under (EV 2-5%)                                       n=207  wr=56.6%   roi=+8.6%
#   Total over: disabled (overall -2.95% ROI on 1,264 bets, no positive slice)

  ncaam:

    moneyline:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        # Heavy favorites (mp 70%+) win at high WR but lose to vig. The 50-60%
        # model_prob band is where the model adds true signal vs the market.
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.50, 0.60]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        # Sweet spot: moderate EV (3-10%) with small Kelly (<5%). Big-Kelly
        # underdogs lose at -27% WR. Tight EV bound prevents the 10%+ tail.
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.03, 0.10]]
        kelly_bands:          [[0.0, 0.05]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    spread:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        # Skip pickem (|line|<3) and only bet at the Kelly extremes (avoid
        # the 2.5-20% middle which loses).
        # |home_spread|>=3 means home_spread <=-3 OR >=3.
        enabled: true
        line_bands:           [[-99.0, -3.0], [3.0, 99.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.025], [0.20, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        # |line|>=6 captures dogs in mid-favored or larger spreads (the
        # market mis-prices). Constraining odds to -110/+100 cuts juice losses.
        # |away_spread|>=6 means away_spread <=-6 OR >=6.
        enabled: true
        line_bands:           [[-99.0, -6.0], [6.0, 99.0]]
        odds_bands:           [[-110, 100]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    total:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      over:
        # No profitable over slice. Disabled.
        enabled: false
        line_bands:           [[100.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      under:
        # 2-5% EV is the only consistently profitable band. High-EV unders
        # (10%+) lost on 593 bets; low-EV (<2%) noisy.
        enabled: true
        line_bands:           [[100.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.02, 0.05]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

###################################################################################################
# WNBA — TUNED ####################################################################################
###################################################################################################
#   ML home    (model_prob >=30%)                                  n=49   wr=61.2%   roi=+41.9%
#   ML away    (Kelly <2.5% OR Kelly 10-20%)                       n=27   wr=51.9%   roi=+127.3%
#   Spread home (|line| >=3)                                       n=8    wr=62.5%   roi=+19.9%   [tiny]
#   Spread away (Kelly 2.5-5% OR Kelly >=10%)                      n=37   wr=62.2%   roi=+18.8%
#   Total over  (Kelly outside 5-10% AND line <165)                n=72   wr=58.6%   roi=+11.7%
#   Total under (Kelly 5-10% OR Kelly >=20%)                       n=57   wr=59.6%   roi=+14.8%
#
# CAVEAT: WNBA samples are small (421 total, 250 after filtering). Effects
# may be partly noise. Watch live performance carefully and re-tune when
# you have more data.

  wnba:

    moneyline:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        # Skip the lowest model_prob bin (<30%, mostly +200+ longshots).
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.30, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        # Bimodal: very small Kelly (true longshots) OR moderate Kelly
        # (genuine spots). Skip the 2.5-10% middle which loses.
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.025], [0.10, 0.20]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    spread:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      home:
        # Skip pickem (|line|<3). |home_spread|>=3 → -3 cutoff.
        # Tiny sample — slice barely justified.
        enabled: true
        line_bands:           [[-99.0, -3.0], [3.0, 99.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        # Skip the 5-10% Kelly dead zone (lost -18%). Keep 2.5-5% and 10%+.
        enabled: true
        line_bands:           [[-99.0, 99.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.025, 0.05], [0.10, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

    total:
      enabled: true
      selection_mode: pick_one
      pick_preference: { metric: ev, direction: max }

      over:
        # Only profitable in lower-total games (<165). Skip the dead 5-10%
        # Kelly band where ROI was -45.5% on 21 bets.
        enabled: true
        line_bands:           [[100.0, 164.99]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.0, 0.05], [0.10, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      under:
        # Profitable Kelly bands: 5-10% AND 20%+. Skip 2.5-5% (-66% ROI)
        # and 10-20% (-20% ROI).
        enabled: true
        line_bands:           [[100.0, 300.0]]
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 1.0]]
        kelly_bands:          [[0.05, 0.10], [0.20, 1.0]]
        model_prob_bands:     [[0.0, 1.0]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []
