name: _Manual UFC Final Scores

on:
  workflow_dispatch:
    inputs:
      league:
        required: true
        type: string
      market:
        required: true
        type: string
      source:
        required: true
        type: string
      raw_text:
        required: true
        type: string

permissions:
  contents: write

jobs:
  intake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Run UFC Final Scores Parser
        if: ${{ github.event.inputs.league == 'final_scores' && github.event.inputs.market == 'UFC' && github.event.inputs.source == 'UFC Results' }}
        run: |
          mkdir -p docs/win/mma/ufc/manual_files
          printf "%s" "${{ github.event.inputs.raw_text }}" > dump.txt
          python docs/win/mma/ufc/scripts/00_parsing/ufc_final_scores.py dump.txt

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/win/mma/ufc/manual_files/ 2>/dev/null || true
          git commit -m "ufc manual final scores intake" || echo "No changes"
          git push
