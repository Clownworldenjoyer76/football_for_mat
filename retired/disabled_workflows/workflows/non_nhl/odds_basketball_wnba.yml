name: Odds Basketball WNBA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wnba-odds-api:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}
      TZ: America/New_York

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create WNBA odds output folders
        run: |
          mkdir -p docs/win/basketball/odds/wnba
          mkdir -p docs/win/basketball/errors/00_intake

      - name: Run WNBA odds API pull
        run: |
          python docs/win/basketball/scripts/00_parsing/wnba_odds_api.py

      - name: Show WNBA odds outputs
        run: |
          echo "=== WNBA JSON outputs ==="
          find docs/win/basketball/odds/wnba -maxdepth 1 -type f -name "*.json" -print

          echo "=== WNBA odds log ==="
          find docs/win/basketball/errors/00_intake -maxdepth 1 -type f -name "wnba_odds_api.txt" -print

      - name: Commit WNBA odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/basketball/odds/wnba/
          git add docs/win/basketball/errors/00_intake/wnba_odds_api.txt

          git diff --cached --quiet && echo "No WNBA odds output changes to commit." || git commit -m "Update WNBA odds API outputs"
          git push
