name: NFL PBP Intake Cycle

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  NFL_SEASON: "2021"

jobs:
  nfl-pbp-intake-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NFL PBP dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml pyarrow nflreadpy nfl-data-py

      - name: Create NFL PBP output folders
        run: |
          mkdir -p docs/win/football/nfl/00_intake/pbp
          mkdir -p docs/win/football/nfl/00_intake/team_stats
          mkdir -p docs/win/football/nfl/errors/00_intake

      - name: Run NFL play-by-play pull
        run: |
          python docs/win/football/nfl/scripts/00_intake/pull_pbp.py --season "$NFL_SEASON"

      - name: Run NFL team stats pull
        run: |
          set -o pipefail
          python docs/win/football/nfl/scripts/00_intake/pull_team_stats.py --season "$NFL_SEASON" 2>&1 | tee docs/win/football/nfl/errors/00_intake/pull_team_stats.txt

      - name: Commit NFL PBP intake outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/football/nfl/00_intake/pbp/
          git add docs/win/football/nfl/00_intake/team_stats/
          git add docs/win/football/nfl/errors/00_intake/pull_pbp.txt
          git add docs/win/football/nfl/errors/00_intake/pull_team_stats.txt

          if git diff --cached --quiet; then
            echo "No NFL PBP intake output changes to commit."
          else
            git commit -m "Update NFL PBP intake outputs"
            git push
          fi
