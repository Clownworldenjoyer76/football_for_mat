name: Odds NHL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nhl-odds-pull:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Verify API key is present
        run: |
          if [ -z "$API_ODDS" ]; then
            echo "API_ODDS is empty"
            exit 1
          fi
          echo "API_ODDS is present"

      - name: Create output directories
        run: |
          mkdir -p docs/win/hockey/nhl/odds
          mkdir -p docs/win/hockey/nhl/00_intake/sportsbook
          mkdir -p docs/win/hockey/nhl/errors/00_intake
          mkdir -p docs/win/hockey/nhl/config/mapping

      - name: Run NHL Odds Pull
        run: python docs/win/hockey/nhl/scripts/00_intake/nhl_odds_pull.py

      - name: Run NHL Odds Name Normalization
        run: python docs/win/hockey/nhl/scripts/00_intake/odds_name_normalization.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/win/hockey/nhl/odds/
          git add docs/win/hockey/nhl/00_intake/sportsbook/
          git add docs/win/hockey/nhl/errors/00_intake/
          git add docs/win/hockey/nhl/config/mapping/no_map_nhl_odds.csv

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore: NHL odds pull run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
