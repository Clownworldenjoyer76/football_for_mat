name: NFL Coaches Pull

on:
  workflow_dispatch:

jobs:
  pull-coaches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run coaches.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/coaches.py

      - name: Commit output file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/data/master/coaches_master.csv
          git diff --staged --quiet || git commit -m "Update coaches_master.csv"
          git push
