name: Intake MLB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baseball-intake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(TZ='America/New_York' date +%Y_%m_%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright system deps
        run: python -m playwright install-deps chromium

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Create output directories
        run: |
          mkdir -p docs/win/baseball/00_intake/sportsbook/
          mkdir -p docs/win/baseball/00_intake/drat_raw/
          mkdir -p docs/win/baseball/00_intake/predictions/
          mkdir -p docs/win/baseball/00_intake/predictions/pred_with_game_id/
          mkdir -p docs/win/baseball/00_intake/predictions/pred_with_game_id/rejections/
          mkdir -p docs/win/baseball/00_intake/games/
          mkdir -p docs/win/baseball/00_intake/mlb_raw/
          mkdir -p docs/win/final_scores/results/mlb/final_scores/
          mkdir -p docs/win/baseball/05_final_scores/results/final_scores/
          mkdir -p docs/win/baseball/errors/00_intake/
          mkdir -p mappings/baseball/no_map/
          mkdir -p docs/win/baseball/data/weather/
          mkdir -p docs/win/baseball/data/weather/metno_raw/

      - name: Baseball Odds Parse
        run: python docs/win/baseball/scripts/00_intake/odds_parse.py docs/win/baseball/odds/${DATE}.json

      - name: Baseball Name Normalization Pre
        run: python docs/win/baseball/scripts/00_intake/name_normalization.py

      - name: Baseball Scraper
        run: python docs/win/baseball/scripts/00_intake/baseball_drat_scraper.py

      - name: Baseball Transform
        run: python docs/win/baseball/scripts/00_intake/transform_baseball.py

      - name: Baseball Name Normalization Post
        run: python docs/win/baseball/scripts/00_intake/name_normalization.py

      - name: Baseball Build Games List
        run: python docs/win/baseball/scripts/00_intake/build_games_list.py

      - name: Baseball Fetch Park Weather
        env:
          METNO_USER_AGENT: "MatsPicksWeather/1.0 local-dev"
        run: python docs/win/baseball/scripts/00_intake/fetch_park_weather.py

      - name: Baseball Build Game Weather
        run: python docs/win/baseball/scripts/00_intake/build_game_weather.py

      - name: Baseball Inject Game IDs Into Predictions
        run: python docs/win/baseball/scripts/00_intake/game_id_pred.py

      - name: Print intake failure diagnostics
        if: failure()
        run: |
          echo "=== docs/win/baseball/errors/00_intake ==="
          find docs/win/baseball/errors/00_intake -type f -maxdepth 1 -print || true

          echo ""
          echo "=== game_id_pred log ==="
          if [ -f docs/win/baseball/errors/00_intake/game_id_pred.txt ]; then
            cat docs/win/baseball/errors/00_intake/game_id_pred.txt
          else
            echo "game_id_pred.txt not found"
          fi

          echo ""
          echo "=== prediction rejection CSVs ==="
          find docs/win/baseball/00_intake/predictions/pred_with_game_id/rejections -type f -name "*.csv" -print -exec cat {} \; || true

      - name: Upload intake diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseball-intake-diagnostics-${{ env.DATE }}
          if-no-files-found: ignore
          path: |
            docs/win/baseball/errors/00_intake/**
            docs/win/baseball/00_intake/predictions/pred_with_game_id/rejections/**
            docs/win/baseball/00_intake/predictions/pred_with_game_id/**
            docs/win/baseball/00_intake/games/**
            docs/win/baseball/00_intake/predictions/**

      - name: Commit outputs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/baseball/00_intake/sportsbook/
          git add docs/win/baseball/00_intake/drat_raw/
          git add docs/win/baseball/00_intake/predictions/
          git add docs/win/baseball/00_intake/predictions/pred_with_game_id/
          git add docs/win/baseball/00_intake/games/
          git add docs/win/baseball/00_intake/mlb_raw/
          git add docs/win/final_scores/results/mlb/final_scores/
          git add docs/win/baseball/05_final_scores/results/final_scores/
          git add docs/win/baseball/errors/00_intake/
          git add mappings/baseball/no_map/
          git add docs/win/baseball/data/weather/

          git diff --cached --quiet || git commit -m "chore: baseball intake run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
