###################################################################################################

  nba:

    moneyline:
      enabled: true
      selection_mode: pick_one
      pick_preference:
        metric: model_prob
        direction: max

      home:
        enabled: true
        odds_bands:           [[-125, 10000]]
        ev_bands:             [[0.02, 0.0399], [0.075, 0.0999]]
        kelly_bands:          [[0.1, 1.0]]
        model_prob_bands:     [[0.60, 0.90]]
        edge_vs_market_bands: [[-100.0, 100.0]]
        months:               []
        exclude_days_of_week: []

      away:
        enabled: true
        odds_bands:           [[-10000, 10000]]
        ev_bands:             [[0.0, 99.0]]
        kelly_bands:          [[0.0, 1.0]]
