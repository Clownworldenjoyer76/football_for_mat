name: NFL Depth Chart Cleanup

on:
  workflow_dispatch:

jobs:
  depth-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run depth_cleanup.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/depth_cleanup.py

      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/data/master/
          git diff --staged --quiet || git commit -m "Update team depth chart files"
          git push
