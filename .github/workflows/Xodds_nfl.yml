name: NFL Odds Pull

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull-nfl-odds:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create NFL odds output folders
        run: |
          mkdir -p docs/win/football/nfl/00_intake/odds/raw
          mkdir -p docs/win/football/nfl/errors/00_intake

      - name: Run NFL odds pull
        run: |
          python docs/win/football/nfl/scripts/00_intake/pull_odds.py

      - name: Commit NFL odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/football/nfl/00_intake/odds/
          git add docs/win/football/nfl/errors/00_intake/pull_odds.txt

          if git diff --cached --quiet; then
            echo "No NFL odds output changes to commit."
          else
            git commit -m "Update NFL odds output"
            git push
          fi
