# docs/win/baseball/config/markets.yaml
markets:

  mlb:
    # ── Context / Environment Settings ──────────────────────────
    rain_exclude_on_will_it_rain: false

    # If symbol_code contains one of these terms, the game is excluded.
    rain_symbol_terms:
      - rain
      - heavyrain
      - lightrain
      - sleet
      - snow
      - thunder

    # Set false to allow more totals through even when one/both SP samples are low.
    sp_sample_exclude_totals: false

    # Flag only. Does not exclude bets.
    lineup_low_sample_warn: 4

    ###################################################
    # ── Moneyline ────────────────────────────────────
    ###################################################

    moneyline:
      enabled: true
      # best_ev = one ML side max per game
      # all = can select both if both pass
      pick_preference: best_ev

      home:
        enabled: true
        odds_bands:
          - [-350, 350]
        ev_bands:
          - [0.001, 0.0099]
          - [0.02, 0.0299]
        kelly_bands:
          - [0.001, 99.99]
        prob_bands:
          - [0.40, 0.99]

      away:
        enabled: true
        odds_bands:
          - [-350, 350]
        ev_bands:
          - [0.01, 0.0199]
          - [0.04, 0.0749] 
        kelly_bands:
          - [0.001, 99.99]
        prob_bands:
          - [0.40, 0.99]

    ###################################################
    # ── Run Line ─────────────────────────────────────
    ###################################################

    run_line:
      enabled: true
      # best_prob allows the more likely RL side when both pass.
      # Use all if you want maximum volume.
      pick_preference: all

      home:
        enabled: true
        line_bands:
          - [-2.5, 2.5]
        odds_bands:
          - [-500,500]
        ev_bands:
          - [0.04, 0.99]
        kelly_bands:
          - [0.00, 0.0001]
        prob_bands:
          - [0.20, 0.50]

      away:
        enabled: true
        line_bands:
          - [-2.5, 2.5]
        odds_bands:
          - [-500, 500]
        ev_bands:
          - [0.01, 0.05]
        kelly_bands:
          - [0.00, 0.0099]
        prob_bands:
          - [0.20, 0.50]

    ###################################################
    # ── Totals ───────────────────────────────────────
    ###################################################

    total:
      enabled: true
      # best_ev = one total side max per game.
      # all = can select both over and under if both pass.
      pick_preference: best_ev

      over:
        enabled: true
        # MLB totals usually live here, but this is intentionally broad.
        line_bands:
          - [7.5, 9.6]
        odds_bands:
          - [-350, 350]
        ev_bands:
          - [0.03, 0.99]
        kelly_bands:
          - [0.001, 0.05]
          - [0.15, 0.99]
        prob_bands:
          - [0.50, 0.80]

      under:
        enabled: true
        line_bands:
          - [8.0, 9.5]
        odds_bands:
          - [-350, 350]
        ev_bands:
          - [0.005, 0.02]
          - [0.04, 0.08]
          - [0.10, 0.99]
        kelly_bands:
          - [0.001, 0.10]
          - [0.30, 0.99]
        prob_bands:
          - [0.65, 0.99]
