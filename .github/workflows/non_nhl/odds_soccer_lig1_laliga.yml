name: Odds Soccer Ligue 1 + La Liga

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  soccer-odds-ligue-1-la-liga:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}
      TZ: America/New_York

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create soccer output folders
        run: |
          mkdir -p docs/win/soccer/00_intake/sportsbook/ligue_1
          mkdir -p docs/win/soccer/00_intake/sportsbook/la_liga
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/ligue_1
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/la_liga
          mkdir -p docs/win/soccer/errors/00_intake

      - name: Run Ligue 1 odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_ligue_1.py

      - name: Run La Liga odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_la_liga.py

      - name: Show output files
        run: |
          echo "=== Sportsbook CSV outputs ==="
          find docs/win/soccer/00_intake/sportsbook/ligue_1 -maxdepth 1 -type f -name "*.csv" -print
          find docs/win/soccer/00_intake/sportsbook/la_liga -maxdepth 1 -type f -name "*.csv" -print

          echo "=== Raw JSON outputs ==="
          find docs/win/soccer/00_intake/odds_api_raw/ligue_1 -maxdepth 1 -type f -name "*.json" -print
          find docs/win/soccer/00_intake/odds_api_raw/la_liga -maxdepth 1 -type f -name "*.json" -print

          echo "=== Logs ==="
          find docs/win/soccer/errors/00_intake -maxdepth 1 -type f -name "odds_ligue_1.txt" -print
          find docs/win/soccer/errors/00_intake -maxdepth 1 -type f -name "odds_la_liga.txt" -print

      - name: Commit soccer odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/soccer/00_intake/sportsbook/ligue_1/
          git add docs/win/soccer/00_intake/sportsbook/la_liga/
          git add docs/win/soccer/00_intake/odds_api_raw/ligue_1/
          git add docs/win/soccer/00_intake/odds_api_raw/la_liga/
          git add docs/win/soccer/errors/00_intake/odds_ligue_1.txt
          git add docs/win/soccer/errors/00_intake/odds_la_liga.txt

          git diff --cached --quiet && echo "No soccer odds output changes to commit." || git commit -m "Update soccer Ligue 1 and La Liga odds outputs"
          git push
