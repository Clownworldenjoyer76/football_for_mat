name: NFL E Predictions Pull

on:
  workflow_dispatch:

jobs:
  pull-espn-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pull_espn_predictions.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/pull_e_predictions.py

      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/00_intake/predictions/e_predictions/
          git add docs/win/football/nfl/errors/00_intake/pull_e_predictions.txt
          git diff --staged --quiet || git commit -m "Update ESPN predictions"
          git push
