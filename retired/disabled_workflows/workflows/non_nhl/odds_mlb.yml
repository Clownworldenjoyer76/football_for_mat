name: Odds MLB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mlb-odds:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Verify API key is present
        run: |
          if [ -z "$API_ODDS" ]; then
            echo "API_ODDS is empty"
            exit 1
          fi
          echo "API_ODDS is present"

      - name: Create output directories
        run: |
          mkdir -p docs/win/baseball/odds

      - name: Run MLB Odds Pull
        run: python docs/win/baseball/scripts/00_parsing/mlb_odds_pull.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/win/baseball/odds/

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore: MLB odds pull $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
