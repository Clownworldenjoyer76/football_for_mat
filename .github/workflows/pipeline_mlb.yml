name: Pipeline MLB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  MLB_Pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p docs/win/baseball/01_merge/
          mkdir -p docs/win/baseball/01_merge/01_merguiced/
          mkdir -p docs/win/baseball/01_merge/audit/
          mkdir -p docs/win/baseball/01_merge/rejections/
          mkdir -p docs/win/baseball/errors/01_merge/
          mkdir -p docs/win/baseball/errors/02_juice/
          mkdir -p docs/win/baseball/02_juice/
          mkdir -p docs/win/baseball/02_juice/audit/
          mkdir -p docs/win/baseball/errors/03_edges/
          mkdir -p docs/win/baseball/03_edges/
          mkdir -p docs/win/baseball/03_edges/ev_kelly/
          mkdir -p docs/win/baseball/03_edges/ev_kelly/audit/
          mkdir -p docs/win/baseball/04_select/
          mkdir -p docs/win/baseball/04_select/audit/
          mkdir -p docs/win/baseball/errors/04_select/

      - name: Baseball Merge Intake
        run: |
          python docs/win/baseball/scripts/01_merge/merge_intake.py || {
            echo ""
            echo "===== MLB MERGE INTAKE LOGS ====="
            find docs/win/baseball/errors/01_merge -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB MERGE AUDIT PREVIEW ====="
            find docs/win/baseball/01_merge/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            echo ""
            echo "===== MLB MERGE REJECTIONS PREVIEW ====="
            find docs/win/baseball/01_merge/rejections -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Baseball Build Juice Files
        run: |
          python docs/win/baseball/scripts/01_merge/build_juice_files.py || {
            echo ""
            echo "===== MLB BUILD JUICE FILES LOGS ====="
            find docs/win/baseball/errors/01_merge -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true
            exit 1
          }

      - name: Baseball Moneyline Juice
        run: |
          python docs/win/baseball/scripts/02_juice/apply_moneyline_juice.py || {
            echo ""
            echo "===== MLB MONEYLINE JUICE LOGS ====="
            find docs/win/baseball/errors/02_juice -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB JUICE AUDIT PREVIEW ====="
            find docs/win/baseball/02_juice/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Baseball Run Line Juice
        run: |
          python docs/win/baseball/scripts/02_juice/apply_run_line_juice.py || {
            echo ""
            echo "===== MLB RUN LINE JUICE LOGS ====="
            find docs/win/baseball/errors/02_juice -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB JUICE AUDIT PREVIEW ====="
            find docs/win/baseball/02_juice/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Baseball Total Juice
        run: |
          python docs/win/baseball/scripts/02_juice/apply_total_juice.py || {
            echo ""
            echo "===== MLB TOTAL JUICE LOGS ====="
            find docs/win/baseball/errors/02_juice -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB JUICE AUDIT PREVIEW ====="
            find docs/win/baseball/02_juice/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Baseball Edges
        run: |
          python docs/win/baseball/scripts/03_edges/compute_edges.py || {
            echo ""
            echo "===== MLB EDGES LOGS ====="
            find docs/win/baseball/errors/03_edges -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true
            exit 1
          }

      - name: Baseball EV Kelly
        run: |
          python docs/win/baseball/scripts/03_edges/compute_ev_kelly.py || {
            echo ""
            echo "===== MLB EV KELLY LOGS ====="
            find docs/win/baseball/errors/03_edges -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB EV KELLY AUDIT PREVIEW ====="
            find docs/win/baseball/03_edges/ev_kelly/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Baseball Select
        run: |
          python docs/win/baseball/scripts/04_select/baseball_select_bets.py || {
            echo ""
            echo "===== MLB SELECT BETS LOGS ====="
            find docs/win/baseball/errors/04_select -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

            echo ""
            echo "===== MLB SELECT AUDIT PREVIEW ====="
            find docs/win/baseball/04_select/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

            exit 1
          }

      - name: Print pipeline logs and audits
        if: always()
        run: |
          echo ""
          echo "===== MLB PIPELINE ERROR LOGS ====="
          find docs/win/baseball/errors/01_merge -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true
          find docs/win/baseball/errors/02_juice -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true
          find docs/win/baseball/errors/03_edges -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true
          find docs/win/baseball/errors/04_select -maxdepth 1 -type f -print -exec sed -n '1,260p' {} \; || true

          echo ""
          echo "===== MLB PIPELINE AUDIT FILES ====="
          find docs/win/baseball/01_merge/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true
          find docs/win/baseball/01_merge/rejections -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true
          find docs/win/baseball/02_juice/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true
          find docs/win/baseball/03_edges/ev_kelly/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true
          find docs/win/baseball/04_select/audit -maxdepth 1 -type f -print -exec sh -c 'echo "ROWS: $(($(wc -l < "$1") - 1))"; echo "HEAD:"; sed -n "1,26p" "$1"' sh {} \; || true

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/win/baseball/01_merge/
          git add docs/win/baseball/errors/01_merge/
          git add docs/win/baseball/errors/02_juice/
          git add docs/win/baseball/02_juice/
          git add docs/win/baseball/errors/03_edges/
          git add docs/win/baseball/03_edges/
          git add docs/win/baseball/04_select/
          git add docs/win/baseball/errors/04_select/

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "chore: MLB Pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
