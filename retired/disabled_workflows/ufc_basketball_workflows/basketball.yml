name: Basketball Pipeline 01-05

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  basketball-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run basketball master pipeline
        run: python docs/win/basketball/scripts/master_scripts/basketball.py

      - name: Show logs
        if: always()
        run: |
          echo "=== Master log ==="
          cat docs/win/basketball/errors/master_scripts/basketball.txt || true

          echo ""
          echo "=== Basketball output files ==="
          find docs/win/basketball/01_merge -type f | sort || true
          find docs/win/basketball/03_edges -type f | sort || true
          find docs/win/basketball/04_select -type f | sort || true
          find docs/win/basketball/05_final_scores -type f | sort || true

      - name: Commit outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/basketball/01_merge/
          git add docs/win/basketball/03_edges/
          git add docs/win/basketball/04_select/
          git add docs/win/basketball/05_final_scores/
          git add docs/win/basketball/errors/
          git add docs/basketball_dashboard.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: run basketball 01-03-04-05 pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
