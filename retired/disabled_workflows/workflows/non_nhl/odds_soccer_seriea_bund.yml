name: Odds Soccer Serie A + Bundesliga

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  soccer-odds-serie-a-bundesliga:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}
      TZ: America/New_York

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create soccer output folders
        run: |
          mkdir -p docs/win/soccer/00_intake/sportsbook/serie_a
          mkdir -p docs/win/soccer/00_intake/sportsbook/bundesliga
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/serie_a
          mkdir -p docs/win/soccer/00_intake/odds_api_raw/bundesliga
          mkdir -p docs/win/soccer/errors/00_intake

      - name: Run Serie A odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_serie_a.py

      - name: Run Bundesliga odds parser
        run: |
          python docs/win/soccer/scripts/00_parsing/odds_bundesliga.py

      - name: Show output files
        run: |
          echo "=== Sportsbook CSV outputs ==="
          find docs/win/soccer/00_intake/sportsbook/serie_a -maxdepth 1 -type f -name "*.csv" -print
          find docs/win/soccer/00_intake/sportsbook/bundesliga -maxdepth 1 -type f -name "*.csv" -print

          echo "=== Raw JSON outputs ==="
          find docs/win/soccer/00_intake/odds_api_raw/serie_a -maxdepth 1 -type f -name "*.json" -print
          find docs/win/soccer/00_intake/odds_api_raw/bundesliga -maxdepth 1 -type f -name "*.json" -print

          echo "=== Logs ==="
          find docs/win/soccer/errors/00_intake -maxdepth 1 -type f -name "odds_serie_a.txt" -print
          find docs/win/soccer/errors/00_intake -maxdepth 1 -type f -name "odds_bundesliga.txt" -print

      - name: Commit soccer odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/soccer/00_intake/sportsbook/serie_a/
          git add docs/win/soccer/00_intake/sportsbook/bundesliga/
          git add docs/win/soccer/00_intake/odds_api_raw/serie_a/
          git add docs/win/soccer/00_intake/odds_api_raw/bundesliga/
          git add docs/win/soccer/errors/00_intake/odds_serie_a.txt
          git add docs/win/soccer/errors/00_intake/odds_bundesliga.txt

          git diff --cached --quiet && echo "No soccer odds output changes to commit." || git commit -m "Update soccer Serie A and Bundesliga odds outputs"
          git push
