name: NFL Team Logos Pull

on:
  workflow_dispatch:

jobs:
  pull-team-logos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pull_team_logos.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/pull_team_logos.py

      - name: Commit output files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/config/mapping/team_logos/
          git add docs/win/football/nfl/errors/00_intake/pull_team_logos.txt
          git diff --staged --quiet || git commit -m "Update team logos"
          git push
