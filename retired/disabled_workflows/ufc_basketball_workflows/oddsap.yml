name: WNBA Odds API

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wnba-odds-api:
    runs-on: ubuntu-latest

    env:
      API_ODDS: ${{ secrets.API_ODDS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ensure output folders exist
        run: |
          mkdir -p docs/win/basketball/odds/wnba
          mkdir -p docs/win/basketball/errors/00_intake

      - name: Run WNBA odds API script
        run: |
          python docs/win/basketball/scripts/00_parsing/wnba_odds_api.py

      - name: Show output files
        if: always()
        run: |
          echo "WNBA odds outputs:"
          find docs/win/basketball/odds/wnba -type f -maxdepth 1 | sort || true

          echo ""
          echo "WNBA odds log:"
          cat docs/win/basketball/errors/00_intake/wnba_odds_api.txt || true

      - name: Commit WNBA odds outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/basketball/odds/wnba/
          git add docs/win/basketball/errors/00_intake/wnba_odds_api.txt

          if git diff --cached --quiet; then
            echo "No WNBA odds changes to commit."
          else
            git commit -m "Update WNBA odds API outputs"
            git push
          fi
