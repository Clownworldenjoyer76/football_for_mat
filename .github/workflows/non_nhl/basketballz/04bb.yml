name: 04 Select Bets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  select-bets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml

      - name: Ensure output folders exist
        run: |
          mkdir -p docs/win/basketball/04_select/daily_slate
          mkdir -p docs/win/basketball/errors/04_select

      - name: Run basketball select bets
        run: |
          python docs/win/basketball/scripts/04_select/basketball_select_bets.py

      - name: Show outputs and log
        if: always()
        run: |
          echo "=== Selected bet outputs ==="
          find docs/win/basketball/04_select -type f | sort || true
          echo ""
          echo "=== Select bets log ==="
          cat docs/win/basketball/errors/04_select/select_bets.txt || true

      - name: Commit outputs
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/win/basketball/04_select
          git add docs/win/basketball/errors/04_select/select_bets.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run basketball select bets"
            git push
          fi
