name: NFL Team Power Index

on:
  workflow_dispatch:

jobs:
  pull-team-power-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run team_power_index.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/team_power_index.py

      - name: Commit output file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/data/team_power_index/
          git diff --staged --quiet || git commit -m "Update team power index data"
          git push
