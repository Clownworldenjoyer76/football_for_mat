name: Intake NHL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nhl-intake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(TZ='America/New_York' date +%Y_%m_%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright system deps
        run: playwright install-deps chromium

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Create output directories
        run: |
          mkdir -p docs/win/hockey/nhl/errors/00_intake/
          mkdir -p docs/win/hockey/nhl/00_intake/games/
          mkdir -p docs/win/hockey/nhl/00_intake/drat_raw/
          mkdir -p docs/win/hockey/nhl/00_intake/drat_raw/rows/
          mkdir -p docs/win/hockey/nhl/00_intake/predictions/
          mkdir -p docs/win/hockey/nhl/00_intake/predictions/scraper/
          mkdir -p docs/win/hockey/nhl/config/mapping/

      - name: NHL Build Games
        run: python docs/win/hockey/nhl/scripts/00_intake/build_games.py

      - name: NHL Drat Scraper
        run: python docs/win/hockey/nhl/scripts/00_intake/hockey_drat_scraper.py

      - name: NHL Transform
        run: python docs/win/hockey/nhl/scripts/00_intake/transform_hockey.py

      - name: Print NHL intake logs on failure
        if: failure()
        run: |
          echo "=== NHL intake logs ==="
          find docs/win/hockey/nhl/errors/00_intake -type f -name "*.txt" -print -exec cat {} \;

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/hockey/nhl/errors/00_intake/
          git add docs/win/hockey/nhl/00_intake/games/
          git add docs/win/hockey/nhl/00_intake/drat_raw/
          git add docs/win/hockey/nhl/00_intake/drat_raw/rows/
          git add docs/win/hockey/nhl/00_intake/predictions/
          git add docs/win/hockey/nhl/00_intake/predictions/scraper/
          git add docs/win/hockey/nhl/config/mapping/

          git diff --cached --quiet || git commit -m "chore: nhl intake run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
