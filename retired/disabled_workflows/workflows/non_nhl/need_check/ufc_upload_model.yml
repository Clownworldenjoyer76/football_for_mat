name: UFC Upload Model Files

# Run this manually from your local machine whenever you retrain
# or update fighter_attributes.json / fighter_history.json
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout model-data branch
        uses: actions/checkout@v4
        with:
          ref: model-data
          fetch-depth: 0

      - name: Verify model files exist
        run: |
          ls -lh data/model/
          echo "If files are missing, push them to the model-data branch first."

      - name: Confirm files committed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model/fighter_attributes.json
          git add data/model/fighter_history.json
          git add data/model/fighter_historical_stats.parquet
          git add data/model/ufc_master_clean.parquet
          git add data/model/ufc_model.pkl
          git diff --cached --quiet || git commit -m "chore: update model files $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin model-data
