# docs/win/baseball/config/markets.yaml


markets:

  mlb:

    # ── Context / Environment Settings ──────────────────────────
    rain_exclude_on_will_it_rain: false

    # Used by baseball_select_bets.py rain_excluded().
    # If symbol_code contains one of these terms, the game is excluded.
    rain_symbol_terms:
      - rain
      - heavyrain
      - lightrain
      - sleet
      - snow
      - thunder

    # Set false to allow more totals through even when one/both SP samples are low.
    sp_sample_exclude_totals: false

    # Flag only. Does not exclude bets.
    lineup_low_sample_warn: 4


    ###################################################
    # ── Moneyline ────────────────────────────────────
    ###################################################

    moneyline:
      enabled: true

      # Wide-open testing:
      #   best_ev = one ML side max per game
      #   all = can select both if both pass
      pick_preference: best_ev

      home:
        enabled: true

        # Avoid only extreme longshots/favorites.
        odds_bands:
          - [-350, 350]

        # Lower EV floor to increase volume.
        ev_bands:
          - [0.005, 0.99]

        # Allow tiny Kelly through for testing.
        kelly_bands:
          - [0.001, 0.99]

        # Basic probability guardrails.
        prob_min: 0.15
        prob_max: 0.90

      away:
        enabled: true

        odds_bands:
          - [-350, 350]

        ev_bands:
          - [0.005, 0.99]

        kelly_bands:
          - [0.001, 0.99]

        prob_min: 0.15
        prob_max: 0.90


    ###################################################
    # ── Run Line ─────────────────────────────────────
    ###################################################

    run_line:
      enabled: true

      # best_prob allows the more likely RL side when both pass.
      # Use all if you want maximum volume.
      pick_preference: best_prob

      home:
        enabled: true

        line_bands:
          - [-2.5, 2.5]

        odds_bands:
          - [-350, 350]

        ev_bands:
          - [0.005, 0.99]

        kelly_bands:
          - [0.001, 0.99]

        prob_min: 0.25
        prob_max: 0.85

      away:
        enabled: true

        line_bands:
          - [-2.5, 2.5]

        odds_bands:
          - [-350, 350]

        ev_bands:
          - [0.005, 0.99]

        kelly_bands:
          - [0.001, 0.99]

        prob_min: 0.25
        prob_max: 0.85


    ###################################################
    # ── Totals ───────────────────────────────────────
    ###################################################

    total:
      enabled: true

      # best_ev = one total side max per game.
      # all = can select both over and under if both pass.
      pick_preference: best_ev

      over:
        enabled: true

        # MLB totals usually live here, but this is intentionally broad.
        line_bands:
          - [5.0, 13.5]

        odds_bands:
          - [-350, 350]

        ev_bands:
          - [0.005, 0.99]

        kelly_bands:
          - [0.001, 0.99]

        prob_min: 0.20
        prob_max: 0.85

      under:
        enabled: true

        line_bands:
          - [5.0, 13.5]

        odds_bands:
          - [-350, 350]

        ev_bands:
          - [0.005, 0.99]

        kelly_bands:
          - [0.001, 0.99]

        prob_min: 0.20
        prob_max: 0.85
