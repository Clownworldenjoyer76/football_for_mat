name: NFL Market Futures Pull

on:
  workflow_dispatch:

jobs:
  pull-market-futures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pull_market_futures.py
        run: |
          python docs/win/football/nfl/scripts/00_intake/pull_market_futures.py

      - name: Commit output file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/win/football/nfl/data/market_futures/
          git diff --staged --quiet || git commit -m "Update market futures data"
          git push
