name: Build QB Map

on:
  workflow_dispatch:

jobs:
  build-qb-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build_qb_map.py
        run: python docs/win/football/nfl/scripts/00_intake/build_qb_map.py

      - name: Commit output file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/win/football/nfl/config/mapping/qb_map_nfl.csv
          git diff --staged --quiet || git commit -m "Update qb_map_nfl.csv"
          git push
