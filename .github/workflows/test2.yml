# .github/workflows/build-game-weather.yml

name: test 2 Build Game Weather

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-game-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run build_game_weather.py
        run: |
          python docs/win/baseball/scripts/00_intake/build_game_weather.py

      - name: Commit weather output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/win/baseball/data/weather/*_weather.csv
          git add docs/win/baseball/errors/00_intake/build_game_weather.txt

          if git diff --cached --quiet; then
            echo "No weather changes to commit."
          else
            git commit -m "Build game weather data"
            git push
          fi
