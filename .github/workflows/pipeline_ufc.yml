name: Pipeline UFC

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify model files on main
        run: |
          test -f data/model/fighter_attributes.json
          test -f data/model/fighter_history.json
          test -f data/model/fighter_historical_stats.parquet
          test -f data/model/ufc_master_clean.parquet
          test -f data/model/ufc_model.pkl
          echo "Model files found on main:"
          ls -lh data/model/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --retries 5 pandas pyarrow numpy scikit-learn xgboost pyyaml playwright
          python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p docs/win/mma/ufc/00_intake/sportsbook
          mkdir -p docs/win/mma/ufc/00_intake/predictions
          mkdir -p docs/win/mma/ufc/01_feature_engineering
          mkdir -p docs/win/mma/ufc/02_edges
          mkdir -p mappings/mma/ufc

      - name: 00 - Normalize fighter names
        run: python docs/win/mma/ufc/scripts/00_intake/00_name_normalization.py

      - name: 01 - Build features
        run: python docs/win/mma/ufc/scripts/01_feature_engineering/01_build_features.py

      - name: 02 - Compute edges
        run: python docs/win/mma/ufc/scripts/02_edges/02_edges.py

      - name: Commit and push all output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/win/mma/ufc/00_intake/sportsbook/*_ufc_odds.csv 2>/dev/null || true
          git add docs/win/mma/ufc/00_intake/predictions/*_ufc_predictions.csv 2>/dev/null || true
          git add mappings/mma/ufc/no_map_fighter_name.csv 2>/dev/null || true
          git add docs/win/mma/ufc/01_feature_engineering/*_ufc_features.csv 2>/dev/null || true
          git add docs/win/mma/ufc/02_edges/*_ufc_edges.csv 2>/dev/null || true

          git diff --cached --quiet || git commit -m "chore: ufc pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"

          git pull --rebase --autostash origin main
          git push origin main
